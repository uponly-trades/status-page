web:
  port: 8080

ui:
  title: UpOnly Status
  description: Real-time health of all UpOnly Trader services
  link: https://uponlytrader.xyz
  buttons:
    - name: Trading App
      link: https://app.uponlytrader.xyz

storage:
  type: sqlite
  path: /data/gatus.db

# ── Service checks ────────────────────────────────────────────────────────────

endpoints:
  # ── Frontend ──────────────────────────────────────────────────────────────

  - name: Trading App
    group: Frontend
    url: "https://app.uponlytrader.xyz"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 3000"
    alerts:
      - type: slack
        failure-threshold: 2
        success-threshold: 1
        description: "Trading App is down"
        send-on-resolved: true

  - name: PnL Dashboard
    group: Frontend
    url: "https://pnl.uponlytrader.xyz"
    interval: 2m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 3000"

  # ── Backend API ───────────────────────────────────────────────────────────

  - name: Trading API
    group: Backend
    url: "https://api.uponlytrader.xyz/health"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 2000"
      - "[BODY].status == ok"
    alerts:
      - type: slack
        failure-threshold: 2
        success-threshold: 1
        description: "Trading API is down"
        send-on-resolved: true

  - name: Screener API
    group: Backend
    url: "https://api.uponlytrader.xyz/screener/symbols?exchange=binanceusdm"
    interval: 5m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 5000"

  - name: WebSocket
    group: Backend
    url: "wss://api.uponlytrader.xyz/ws"
    interval: 5m
    conditions:
      - "[CONNECTED] == true"

  # ── Intelligence ─────────────────────────────────────────────────────────

  - name: Signal Service (LLM)
    group: Intelligence
    url: "https://llm-stable.uponlytrader.xyz/v1/health"
    interval: 1m
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 10000"
    alerts:
      - type: slack
        failure-threshold: 3
        success-threshold: 1
        description: "LLM Signal Service is down"
        send-on-resolved: true
