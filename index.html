<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UpOnly Status</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      padding: 48px 16px 64px;
      color: #f1f5f9;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    /* ── Header ─────────────────────────────────── */
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #94a3b8; letter-spacing: -0.01em; }

    /* ── Banner ─────────────────────────────────── */
    .banner {
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
    }
    .banner.up      { background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.2); }
    .banner.down    { background: rgba(248,113,113,.08); border: 1px solid rgba(248,113,113,.2); }
    .banner.partial { background: rgba(251,191,36,.08);  border: 1px solid rgba(251,191,36,.2); }

    .banner-dot {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .banner.up      .banner-dot { background: #4ade80; color: #052e16; }
    .banner.down    .banner-dot { background: #f87171; color: #fff; }
    .banner.partial .banner-dot { background: #fbbf24; color: #1c1917; }

    .banner-text h2 { font-size: 15px; font-weight: 600; }
    .banner.up      .banner-text h2 { color: #4ade80; }
    .banner.down    .banner-text h2 { color: #f87171; }
    .banner.partial .banner-text h2 { color: #fbbf24; }
    .banner-text p  { font-size: 12px; margin-top: 2px; color: #94a3b8; }

    /* ── Card ───────────────────────────────────── */
    .card {
      background: #1e293b;
      border-radius: 12px;
      border: 1px solid #334155;
      overflow: hidden;
    }
    .card-label {
      padding: 10px 20px;
      font-size: 10.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: #64748b;
      border-bottom: 1px solid #334155;
    }

    /* ── Service row ────────────────────────────── */
    .row {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(51,65,85,.5);
    }
    .row:last-child { border-bottom: none; }

    .row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .row-name  { font-size: 13.5px; font-weight: 500; color: #f1f5f9; }
    .row-group { font-size: 11px; color: #64748b; margin-top: 2px; }

    .badge {
      display: flex; align-items: center;
      gap: 6px; flex-shrink: 0; margin-left: 16px;
    }
    .badge-dot {
      width: 7px; height: 7px;
      border-radius: 50%; flex-shrink: 0;
    }
    .badge-dot.up      { background: #4ade80; }
    .badge-dot.down    { background: #f87171; }
    .badge-dot.partial { background: #fbbf24; }
    .badge-dot.unknown { background: #475569; }
    .badge-label { font-size: 12px; color: #94a3b8; }

    /* ── Uptime bars ─────────────────────────────── */
    .bars-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }
    .bars {
      display: flex;
      gap: 2px;
      flex: 1;
    }
    .bar {
      flex: 1;
      height: 22px;
      border-radius: 2px;
      cursor: default;
      transition: opacity .15s;
    }
    .bar:hover { opacity: .75; }
    .bar.up    { background: #22c55e; }
    .bar.down  { background: #ef4444; }
    .bar.empty { background: #1e3a5f; }

    .bars-meta {
      font-size: 11px; color: #64748b;
      white-space: nowrap; flex-shrink: 0;
      min-width: 32px; text-align: right;
    }

    /* ── Footer ─────────────────────────────────── */
    .footer { margin-top: 20px; text-align: center; font-size: 11.5px; color: #64748b; }
    .footer a { color: inherit; text-decoration: none; }
    .footer a:hover { color: #94a3b8; }

    /* ── Skeleton ───────────────────────────────── */
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.2} }
    .sk { background: #334155; border-radius: 4px; animation: pulse 1.5s ease infinite; }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="header"><h1>UpOnly Trader Status</h1></div>

    <div id="banner" class="banner up">
      <div class="banner-dot">✓</div>
      <div class="banner-text">
        <h2>Checking services…</h2>
        <p>Fetching latest status</p>
      </div>
    </div>

    <div class="card">
      <div class="card-label">Services</div>
      <div id="list">
        <div class="row">
          <div class="row-top">
            <div><div class="sk" style="height:13px;width:130px"></div></div>
            <div class="badge"><div class="sk" style="height:10px;width:70px"></div></div>
          </div>
          <div class="bars-row"><div class="sk" style="height:22px;flex:1;border-radius:2px"></div></div>
        </div>
        <div class="row">
          <div class="row-top">
            <div><div class="sk" style="height:13px;width:100px"></div></div>
            <div class="badge"><div class="sk" style="height:10px;width:70px"></div></div>
          </div>
          <div class="bars-row"><div class="sk" style="height:22px;flex:1;border-radius:2px"></div></div>
        </div>
        <div class="row">
          <div class="row-top">
            <div><div class="sk" style="height:13px;width:155px"></div></div>
            <div class="badge"><div class="sk" style="height:10px;width:70px"></div></div>
          </div>
          <div class="bars-row"><div class="sk" style="height:22px;flex:1;border-radius:2px"></div></div>
        </div>
      </div>
    </div>

    <p class="footer">
      <a href="https://uponlytrader.xyz">uponlytrader.xyz</a>
      &nbsp;·&nbsp;
      <span id="ts">Refreshes every 30s</span>
    </p>

  </div>

  <script>
    const N = 30;

    function statusOf(ep) {
      if (!ep.results?.length) return { cls: 'unknown', label: 'Unknown' };
      return ep.results[0].success
        ? { cls: 'up',   label: 'Operational' }
        : { cls: 'down', label: 'Disruption'  };
    }

    function bars(results) {
      const filled = results?.length
        ? [...results].reverse().map(r =>
            `<div class="bar ${r.success ? 'up' : 'down'}" title="${new Date(r.timestamp).toLocaleString()}"></div>`)
        : [];
      const empty = Array(Math.max(0, N - filled.length))
        .fill('<div class="bar empty"></div>');
      const pct = results?.length
        ? Math.round(results.filter(r => r.success).length / results.length * 100) + '%'
        : '—';
      return `<div class="bars">${[...empty, ...filled].join('')}</div>
              <span class="bars-meta">${pct}</span>`;
    }

    function render(data) {
      const downCount = data.filter(ep => statusOf(ep).cls !== 'up').length;
      const cls = downCount === 0 ? 'up' : downCount === data.length ? 'down' : 'partial';

      const b = document.getElementById('banner');
      b.className = 'banner ' + cls;
      b.querySelector('.banner-dot').textContent = downCount === 0 ? '✓' : '!';
      b.querySelector('h2').textContent =
        downCount === 0 ? 'All Systems Operational' :
        downCount === data.length ? 'Major Outage' : 'Partial Outage';
      b.querySelector('p').textContent = 'Last checked ' + new Date().toLocaleTimeString();

      document.getElementById('list').innerHTML = data.map(ep => {
        const s = statusOf(ep);
        return `<div class="row">
          <div class="row-top">
            <div>
              <div class="row-name">${ep.name}</div>
              ${ep.group ? `<div class="row-group">${ep.group}</div>` : ''}
            </div>
            <div class="badge">
              <span class="badge-dot ${s.cls}"></span>
              <span class="badge-label">${s.label}</span>
            </div>
          </div>
          <div class="bars-row">${bars(ep.results)}</div>
        </div>`;
      }).join('');

      document.getElementById('ts').textContent = 'Updated ' + new Date().toLocaleTimeString();
    }

    async function refresh() {
      try {
        const r = await fetch('/api/v1/endpoints/statuses?t=' + Date.now());
        if (!r.ok) throw new Error(r.status);
        render(await r.json());
      } catch (_) {}
    }

    refresh();
    setInterval(refresh, 30000);
  </script>
</body>
</html>
