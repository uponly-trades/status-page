name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Validate YAML syntax + endpoint fields
        run: |
          python3 -c "
          import yaml, sys
          with open('config.yaml') as f:
              cfg = yaml.safe_load(f)
          endpoints = cfg.get('endpoints', [])
          print(f'Config valid — {len(endpoints)} endpoints defined')
          for ep in endpoints:
              assert 'name' in ep, f'Missing name: {ep}'
              assert 'url' in ep, f'Missing url in: {ep[\"name\"]}'
              assert 'conditions' in ep, f'Missing conditions in: {ep[\"name\"]}'
          print('All endpoints validated.')
          "

      - name: Build Docker image
        run: docker build -t uponly-status:ci-${{ github.sha }} .

      - name: Smoke test — container boots and /health responds
        run: |
          docker run -d --name status-ci-${{ github.sha }} \
            -p 18080:8080 \
            uponly-status:ci-${{ github.sha }}
          for i in $(seq 1 10); do
            curl -sf http://localhost:18080/health && break || sleep 2
          done
          docker rm -f status-ci-${{ github.sha }}
          docker rmi uponly-status:ci-${{ github.sha }} || true

  deploy:
    needs: validate
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via Coolify API
        run: |
          DEPLOY=$(curl -sf -X POST \
            "https://ctrl.uponlytrader.xyz/api/v1/applications/iacaol8xgb4qcjypzmlzfg6b/start" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json")
          echo "Deploy queued: $DEPLOY"
